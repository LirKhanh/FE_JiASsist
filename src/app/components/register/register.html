<div class="register-wrapper">
  <div class="register-box">
    <div class="register-header">
      <img src="/image/web_logo.png" alt="Logo" class="logo">
      <h2>Create Account</h2>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-control">
        <label for="fullname">Full Name</label>
        <input 
          type="text" 
          id="fullname" 
          formControlName="fullname" 
          placeholder="Enter your full name"
          [class.error]="registerForm.get('fullname')?.invalid && registerForm.get('fullname')?.touched"
        >
        <div *ngIf="registerForm.get('fullname')?.touched && registerForm.get('fullname')?.errors" class="error-msg">
          <small *ngIf="registerForm.get('fullname')?.errors?.['required']">Full name is required.</small>
        </div>
      </div>

      <div class="form-control">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="Enter your email"
          [class.error]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
        >
        <div *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.errors" class="error-msg">
          <small *ngIf="registerForm.get('email')?.errors?.['required']">Email is required.</small>
          <small *ngIf="registerForm.get('email')?.errors?.['email']">Invalid email format.</small>
        </div>
      </div>

      <div class="form-control">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          formControlName="username" 
          placeholder="Enter username"
          [class.error]="registerForm.get('username')?.invalid && registerForm.get('username')?.touched"
        >
        <div *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.errors" class="error-msg">
          <small *ngIf="registerForm.get('username')?.errors?.['required']">Username is required.</small>
          <small *ngIf="registerForm.get('username')?.errors?.['minlength']">Username must be at least 3 characters.</small>
        </div>
      </div>

      <div class="form-control">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="Enter password"
          [class.error]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
        >
        <div *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.errors" class="error-msg">
          <small *ngIf="registerForm.get('password')?.errors?.['required']">Password is required.</small>
          <small *ngIf="registerForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</small>
        </div>
      </div>

      <div class="form-control">
        <label for="confirmPassword">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          formControlName="confirmPassword" 
          placeholder="Confirm password"
          [class.error]="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched"
        >
        <div *ngIf="registerForm.get('confirmPassword')?.touched && registerForm.get('confirmPassword')?.errors" class="error-msg">
          <small *ngIf="registerForm.get('confirmPassword')?.errors?.['required']">Confirmation is required.</small>
          <small *ngIf="registerForm.get('confirmPassword')?.errors?.['passwordMismatch']">Passwords do not match.</small>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full" [disabled]="(registerForm.touched && registerForm.invalid) || loading">
        <span *ngIf="!loading">Sign Up</span>
        <span *ngIf="loading">Registering...</span>
      </button>
    </form>

    <div class="register-footer">
      <p>Already have an account? <a routerLink="/login">Log in</a></p>
    </div>
  </div>
</div>
