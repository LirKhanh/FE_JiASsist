<app-notification></app-notification>

<header *ngIf="showMenu" class="bg-primary shadow-lg sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <div class="flex items-center space-x-8">
        <!-- Logo -->
        <div class="flex-shrink-0 flex items-center">
          <div class="bg-white rounded-lg p-1.5 shadow-sm border border-white/20">
            <img src="/image/web_logo.png" alt="Logo" class="h-8 w-auto">
          </div>
        </div>

        <!-- Navigation -->
        <nav class="hidden md:flex space-x-1">
          <a routerLink="/dashboard" routerLinkActive="bg-primary-hover text-white" class="px-3 py-2 rounded-md text-sm font-medium text-white/80 hover:text-white hover:bg-primary-hover transition-all">Dashboard</a>
          <a routerLink="/projects" routerLinkActive="bg-primary-hover text-white" class="px-3 py-2 rounded-md text-sm font-medium text-white/80 hover:text-white hover:bg-primary-hover transition-all">Projects</a>
          <a routerLink="/issues" routerLinkActive="bg-primary-hover text-white" class="px-3 py-2 rounded-md text-sm font-medium text-white/80 hover:text-white hover:bg-primary-hover transition-all">Issues</a>
          <a routerLink="/admin" routerLinkActive="bg-primary-hover text-white" class="px-3 py-2 rounded-md text-sm font-medium text-white/80 hover:text-white hover:bg-primary-hover transition-all">Administrator</a>
        </nav>

        <button class="bg-white/20 hover:bg-white/30 text-white px-4 py-1.5 rounded text-sm font-bold transition-all border border-white/10 shadow-inner">
          Create
        </button>
      </div>
      
      <div class="flex items-center space-x-6">
        <div class="flex items-center space-x-3 group cursor-pointer">
          <div class="text-right">
            <p class="text-xs text-white/60 font-medium leading-none">Logged in as</p>
            <p class="text-sm text-white font-bold">Admin</p>
          </div>
          <div class="h-9 w-9 bg-white/20 rounded-full flex items-center justify-center border border-white/30 group-hover:bg-white/30 transition-all">
            <span class="text-white font-bold text-sm">A</span>
          </div>
        </div>
        
        <button (click)="logout()" class="text-white/80 hover:text-white p-2 rounded-full hover:bg-white/10 transition-all" title="Logout">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>

<main class="bg-gray-50 min-h-[calc(100vh-64px)]">
  <router-outlet></router-outlet>
</main>
